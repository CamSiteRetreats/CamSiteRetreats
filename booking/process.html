<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Tour - CAM SITE RETREATS</title>
    <meta property="og:title" content="Đăng ký Tour - CAM SITE RETREATS">
    <meta property="og:description" content="Điền thông tin đăng ký Tour cùng CAM SITE RETREATS 🏔️">
    <meta property="og:image" content="https://camsiteretreats.com/og-payment.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/booking-engine.js" defer></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding-bottom: 60px;
            color: #1f2937;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 12px rgba(0,0,0,.06);
        }
        .header-inner {
            max-width: 640px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo { height: 52px; width: auto; object-fit: contain; }
        .header-tag {
            font-size: 11px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Main */
        .main {
            max-width: 640px;
            margin: 32px auto 0;
            padding: 0 16px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 2px 24px rgba(0,0,0,.07);
            border: 1px solid #f0f0f0;
        }

        /* Loading state */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #E85D04;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html">
                <img src="../logo.png" alt="CAM SITE RETREATS" class="header-logo" loading="lazy">
            </a>
            <span class="header-tag">Đăng ký Tour</span>
        </div>
    </header>

    <main class="main">
        <div class="card">
            <div id="booking-container">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p style="font-weight:600;">Đang tải thông tin tour...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const params = new URLSearchParams(window.location.search);
        const tourId = params.get('tour') || params.get('tourId');
        const tourName = params.get('name') || '';
        const tourDate = params.get('date') || '';
        const tourPrice = params.get('price') || '';
        const bookingId = params.get('id'); // Existing booking ID for payment

        // If we have a bookingId, redirect to payment page directly
        if (bookingId && !tourId && !tourName) {
            // Load from DB and go straight to step 4
            fetch(`/api/payment?action=link&id=${bookingId}`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('booking-container');
                    BookingEngine.mount(container, null, data.date, {
                        tourData: {
                            id: null,
                            name: data.tour,
                            price: data.total_price || 0,
                            form_config: {},
                            pickup_points: [],
                            services: []
                        },
                        onSuccess: (saved) => {
                            console.log('Booking saved:', saved);
                        }
                    }).then(() => {
                        // Pre-fill data
                        BookingEngine.bookingData = {
                            name: data.name || '',
                            phone: data.phone || '',
                        };
                        // Jump to payment step
                        BookingEngine._renderStep(4);
                    });
                })
                .catch(err => {
                    document.getElementById('booking-container').innerHTML = `
                        <div class="error-state">
                            <p style="color:#dc2626;font-weight:700;">Không thể tải dữ liệu đặt chỗ.</p>
                            <a href="../index.html" style="color:#E85D04;font-weight:600;text-decoration:none;margin-top:12px;display:inline-block;">← Về trang chủ</a>
                        </div>`;
                });
        } else {
            // Normal booking flow from a tour page
            const container = document.getElementById('booking-container');

            // Build tourData from URL params if no ID
            const fallbackTourData = tourName ? {
                id: tourId || null,
                name: decodeURIComponent(tourName),
                price: tourPrice ? parseInt(tourPrice) : 0,
                form_config: {
                    step2: { show_pickup: true, show_medal_name: true, show_vegetarian: true, show_trekking_pole: true, show_special_request: true },
                    step3: { show_coupon: true }
                },
                pickup_points: [],
                services: []
            } : null;

            BookingEngine.mount(container, tourId, decodeURIComponent(tourDate || ''), {
                tourData: fallbackTourData,
                onSuccess: (saved) => {
                    console.log('Booking saved, polling for payment:', saved.id);
                }
            });
        }
    </script>
</body>

</html>
