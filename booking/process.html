<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Tour - CAM SITE RETREATS</title>
    <meta property="og:title" content="Đăng ký Tour - CAM SITE RETREATS">
    <meta property="og:description" content="Điền thông tin đăng ký Tour cùng CAM SITE RETREATS 🏔️">
    <meta property="og:image" content="https://camsiteretreats.com/og-payment.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/booking-engine.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding-bottom: 60px;
            color: #1f2937;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 12px rgba(0,0,0,.06);
        }
        .header-inner {
            max-width: 640px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo { height: 52px; width: auto; object-fit: contain; }
        .header-tag {
            font-size: 11px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Main */
        .main {
            max-width: 640px;
            margin: 32px auto 0;
            padding: 0 16px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 2px 24px rgba(0,0,0,.07);
            border: 1px solid #f0f0f0;
        }

        /* Loading state */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #E85D04;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html">
                <img src="../logo.png" alt="CAM SITE RETREATS" class="header-logo" loading="lazy">
            </a>
            <span class="header-tag">Đăng ký Tour</span>
        </div>
    </header>

    <main class="main">
        <div class="card">
            <div id="booking-container">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p style="font-weight:600;">Đang tải thông tin tour...</p>
                </div>
            </div>
        </div>
    </main>

<script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();

            const params = new URLSearchParams(window.location.search);
            const tourId   = params.get('tour') || params.get('tourId');
            const tourName = params.get('name') || '';
            const tourDate = params.get('date') || '';
            const tourPrice= params.get('price') || '';
            const bookingId= params.get('id'); // đơn thủ công hoặc link gửi lại

            const container = document.getElementById('booking-container');

            if (typeof BookingEngine === 'undefined') {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#dc2626;font-weight:600;">Không thể tải form. Vui lòng tải lại trang.</div>';
                return;
            }

            const fallbackTourData = tourName ? {
                id: tourId || null,
                name: decodeURIComponent(tourName),
                price: tourPrice ? parseInt(tourPrice) : 0,
                form_config: {
                    step2: { show_pickup: true, show_medal_name: true, show_vegetarian: true, show_trekking_pole: true, show_special_request: true },
                    step3: { show_coupon: true }
                },
                pickup_points: [],
                services: []
            } : null;

            // Luôn mount từ bước 1
            const mountPromise = BookingEngine.mount(container, tourId, decodeURIComponent(tourDate || ''), {
                tourData: fallbackTourData,
                onSuccess: (saved) => {
                    console.log('Booking saved:', saved.id);
                }
            });

            // Nếu có bookingId (lên đơn thủ công / gửi link lại) → pre-fill sau khi mount
            if (bookingId) {
                const doFill = () => {
                    fetch(`/api/bookings?id=${bookingId}`)
                        .then(r => r.json())
                        .then(data => {
                            const b = data.data || data;
                            if (!b || !b.name) return;

                            // Pre-fill bookingData
                            BookingEngine.bookingData = {
                                name:          b.name         || '',
                                phone:         b.phone        || '',
                                dob:           b.dob          || '',
                                gender:        b.gender       || '',
                                idCard:        b.id_card      || '',
                                address:       b.address      || '',
                                pickupPoint:   b.pickup_point || '',
                                medalName:     b.medal_name   || '',
                                vegetarian:    b.diet === 'Ăn chay',
                                trekkingPole:  b.trekking_pole === 'Có',
                                specialRequest:b.special      || '',
                            };

                            // Set tour name/date nếu chưa có từ URL
                            if (!BookingEngine.tourData?.name && b.tour) {
                                BookingEngine.tourData = BookingEngine.tourData || {};
                                BookingEngine.tourData.name = b.tour;
                                BookingEngine.tourData.price = b.total_price || 0;
                            }
                            if (!BookingEngine.selectedDate && b.date) {
                                BookingEngine.selectedDate = b.date;
                            }

                            // Re-render bước 1 với dữ liệu đã fill
                            BookingEngine._renderStep(1);
                        })
                        .catch(err => console.warn('Pre-fill error:', err));
                };

                // Chờ mount() hoàn thành (async) rồi mới fill
                if (mountPromise && typeof mountPromise.then === 'function') {
                    mountPromise.then(doFill);
                } else {
                    setTimeout(doFill, 500);
                }
            }
        });
</script>
</body>

</html>
