п»ҝ<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>в”ҖГүв”ҖГўng kв”ңв•ң Tour - CAM SITE RETREATS</title>
    <meta property="og:title" content="в”ҖГүв”ҖГўng kв”ңв•ң Tour - CAM SITE RETREATS">
    <meta property="og:description" content="в”ҖГүiГҹв•—Гјn thв”ңв”Өng tin в”ҖГҰв”ҖГўng kв”ңв•ң Tour cв”ңв•Јng CAM SITE RETREATS вүЎЖ’Г…Г¶вҲ©в••Г…">
    <meta property="og:image" content="https://camsiteretreats.com/og-payment.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/booking-engine.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding-bottom: 60px;
            color: #1f2937;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 12px rgba(0,0,0,.06);
        }
        .header-inner {
            max-width: 640px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo { height: 52px; width: auto; object-fit: contain; }
        .header-tag {
            font-size: 11px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Main */
        .main {
            max-width: 640px;
            margin: 32px auto 0;
            padding: 0 16px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 2px 24px rgba(0,0,0,.07);
            border: 1px solid #f0f0f0;
        }

        /* Loading state */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #E85D04;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html">
                <img src="../logo.png" alt="CAM SITE RETREATS" class="header-logo" loading="lazy">
            </a>
            <span class="header-tag">в”ҖГүв”ҖГўng kв”ңв•ң Tour</span>
        </div>
    </header>

    <main class="main">
        <div class="card">
            <div id="booking-container">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p style="font-weight:600;">в”ҖГүang tГҹв•‘Гәi thв”ңв”Өng tin tour...</p>
                </div>
            </div>
        </div>
    </main>

<script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();

            const params = new URLSearchParams(window.location.search);
            const tourId   = params.get('tour') || params.get('tourId');
            const tourName = params.get('name') || '';
            const tourDate = params.get('date') || '';
            const tourPrice= params.get('price') || '';
            const bookingId= params.get('id'); // в”ҖГҰв•һГӯn thГҹв•—Вә cв”ңв”Өng hoГҹв•‘в•–c link gГҹв•—ВЎi lГҹв•‘Гӯi

            const container = document.getElementById('booking-container');

            // О“Г¶ГҮО“Г¶ГҮ Danh sв”ңГӯch trГҹв•‘Гӯng thв”ңГӯi в”ҖГҰв”ңГә "hoв”ңГЎn tГҹв•‘Г‘t" О“ГҮГ¶ link sГҹв•‘в•ң tГҹв•—в–’ в”ҖГҰв”ңв”Ӯng О“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮ
            const CLOSED_STATUSES = ['в”ҖГүв”ңГә cГҹв•—Г¬c', 'в”ҖГүв”ңГә cГҹв•—Г¬c (ChГҹв•—ВҘ в”ҖГҰi)', 'Hoв”ңГЎn thв”ңГЎnh'];

            // О“Г¶ГҮО“Г¶ГҮ HiГҹв•—Гўn thГҹв•—ГҜ mв”ңГЎn hв”ңВјnh "Link в”ҖГҰв”ңГә в”ҖГҰв”ңв”Ӯng" О“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮ
            const showCompletedNotice = (bookingData) => {
                const name = bookingData?.name || 'Quв”ңв•ң khв”ңГӯch';
                const tour = bookingData?.tour || '';
                const date = bookingData?.date || '';

                container.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; gap:20px; padding:40px 20px; text-align:center; animation: fadeIn .4s ease-out;">
                        <!-- Icon check circle -->
                        <div style="width:80px; height:80px; background: linear-gradient(135deg, #d1fae5, #a7f3d0); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 24px rgba(16,185,129,.2);">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>

                        <!-- Title -->
                        <div>
                            <h2 style="font-size:22px; font-weight:900; color:#1f2937; margin:0 0 6px;">в”ҖГүв”ҖГўng kв”ңв•ң в”ҖГҰв”ңГә hoв”ңГЎn tГҹв•‘Г‘t!</h2>
                            <p style="font-size:14px; color:#6b7280; line-height:1.6; margin:0;">
                                Thв”ңв”Өng tin cГҹв•—Вәa <strong style="color:#1f2937;">${name}</strong> в”ҖГҰв”ңГә в”ҖГҰв•һв–‘Гҹв•—Гәc ghi nhГҹв•‘ВЎn thв”ңГЎnh cв”ңв”Өng.
                                ${tour ? `<br>Tour: <strong style="color:#E85D04;">${tour}</strong>` : ''}
                                ${date ? ` в”¬в•– Ngв”ңГЎy: <strong>${date}</strong>` : ''}
                            </p>
                        </div>

                        <!-- Info box -->
                        <div style="background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:16px; padding:16px 20px; max-width:320px; width:100%; text-align:left;">
                            <div style="font-size:12px; font-weight:700; color:#15803d; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Ghi chв”ңв•‘</div>
                            <p style="font-size:13px; color:#166534; line-height:1.6; margin:0;">
                                Link в”ҖГҰв”ҖГўng kв”ңв•ң nв”ңГЎy в”ҖГҰв”ңГә в”ҖГҰв•һв–‘Гҹв•—Гәc в”ҖГҰв”ңв”Ӯng sau khi hoв”ңГЎn tГҹв•‘Г‘t xв”ңГӯc nhГҹв•‘ВЎn cГҹв•—Г¬c. NГҹв•‘в”җu bГҹв•‘Гӯn cГҹв•‘Вәn thay в”ҖГҰГҹв•—ГІi thв”ңв”Өng tin, vui lв”ңв–“ng liв”ңВ¬n hГҹв•—Г§ trГҹв•—в–’c tiГҹв•‘в”җp vГҹв•—Вўi CAM SITE RETREATS.
                            </p>
                        </div>

                        <!-- CTA -->
                        <div style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px;">
                            <a href="tel:+84123456789" style="
                                background: #E85D04; color: white; text-decoration:none;
                                padding:14px 20px; border-radius:14px; font-weight:700;
                                font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px;
                                box-shadow: 0 4px 16px rgba(232,93,4,.3); transition:opacity .2s;
                            ">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.81-.81a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17.92z"/></svg>
                                Liв”ңВ¬n hГҹв•—Г§ hГҹв•—Г№ trГҹв•—Гә
                            </a>
                            <a href="/" style="
                                background: #f3f4f6; color: #4b5563; text-decoration:none;
                                padding:14px 20px; border-radius:14px; font-weight:600;
                                font-size:14px; text-align:center; transition:background .2s;
                            ">VГҹв•—Гј trang chГҹв•—Вә</a>
                        </div>
                    </div>
                    <style>
                        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
                    </style>
                `;
            };

            if (typeof BookingEngine === 'undefined') {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#dc2626;font-weight:600;">Khв”ңв”Өng thГҹв•—Гў tГҹв•‘Гәi form. Vui lв”ңв–“ng tГҹв•‘Гәi lГҹв•‘Гӯi trang.</div>';
                return;
            }

            const fallbackTourData = tourName ? {
                id: tourId || null,
                name: decodeURIComponent(tourName),
                price: tourPrice ? parseInt(tourPrice) : 0,
                form_config: {
                    step2: { show_pickup: true, show_medal_name: true, show_vegetarian: true, show_trekking_pole: true, show_special_request: true },
                    step3: { show_coupon: true }
                },
                pickup_points: [],
                services: []
            } : null;

            // Luв”ңв”Өn mount tГҹв•—ВҪ bв•һв–‘Гҹв•—Вўc 1
            const mountPromise = BookingEngine.mount(container, tourId, decodeURIComponent(tourDate || ''), {
                tourData: fallbackTourData,
                onSuccess: (saved) => {
                    console.log('Booking saved:', saved.id);
                }
            });

            // NГҹв•‘в”җu cв”ңв”Ӯ bookingId О“ГҘГҶ kiГҹв•—Гўm tra trГҹв•‘Гӯng thв”ңГӯi trв•һв–‘Гҹв•—Вўc khi pre-fill
            if (bookingId) {
                const doFill = () => {
                    fetch(`/api/bookings?id=${bookingId}`)
                        .then(r => r.json())
                        .then(async b => {
                            if (!b || !b.name) return;

                            // О“Г¶ГҮО“Г¶ГҮ KIГҹв•—Г©M TRA: Link в”ҖГҰв”ңГә в”ҖГҰв”ңв”Ӯng nГҹв•‘в”җu в”ҖГҰв”ңГә thanh toв”ңГӯn/hoв”ңГЎn tГҹв•‘Г‘t О“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮ
                            if (b.status && CLOSED_STATUSES.some(s => b.status.includes(s))) {
                                showCompletedNotice(b);
                                return; // DГҹв•—ВҪng, khв”ңв”Өng render form
                            }
                            // О“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮО“Г¶ГҮ

                            // LГҹв•‘Г‘y full tour config
                            let fullTour = null;
                            if (b.tour) {
                                try {
                                    const tr = await fetch('/api/admin_tours');
                                    const td = await tr.json();
                                    const tours = td.data || td;
                                    fullTour = tours.find(t =>
                                        t.name?.toLowerCase().trim() === b.tour?.toLowerCase().trim()
                                    );
                                } catch(e) { console.warn('Tour config fetch error:', e); }
                            }

                            const tourData = fullTour ? {
                                id:            fullTour.id,
                                name:          fullTour.name,
                                price:         b.total_price || fullTour.price || 0,
                                form_config:   typeof fullTour.form_config === 'string' ? JSON.parse(fullTour.form_config) : (fullTour.form_config || {}),
                                pickup_points: typeof fullTour.pickup_points === 'string' ? JSON.parse(fullTour.pickup_points) : (fullTour.pickup_points || []),
                                services:      typeof fullTour.services === 'string' ? JSON.parse(fullTour.services) : (fullTour.services || []),
                            } : {
                                id: null, name: b.tour || '',
                                price: b.total_price || 0,
                                form_config: { step2: { show_pickup: true, show_medal_name: true, show_vegetarian: true, show_trekking_pole: true, show_special_request: true }, step3: { show_coupon: true } },
                                pickup_points: [], services: []
                            };

                            const prefill = {
                                savedId:        bookingId,
                                name:           b.name          || '',
                                phone:          b.phone         || '',
                                dob:            b.dob           || '',
                                gender:         b.gender        || '',
                                idCard:         b.id_card       || '',
                                address:        b.address       || '',
                                pickupPoint:    b.pickup_point  || '',
                                medalName:      b.medal_name    || '',
                                vegetarian:     b.diet === 'в”ҖГ©n chay',
                                trekkingPole:   b.trekking_pole === 'Cв”ңв”Ӯ',
                                specialRequest: b.special       || '',
                                depositRequired: parseInt(b.deposit_required),
                            };

                            // Re-mount vГҹв•—Вўi в”ҖГҰГҹв•—Вә tourData (в”ҖГҰГҹв•—Гў sinh в”ҖГҰв”ңв•‘ng form step 2 & 3)
                            await BookingEngine.mount(container, tourData.id, b.date || '', {
                                tourData,
                                onSuccess: (saved) => { console.log('Booking saved:', saved.id); }
                            });
                            BookingEngine.bookingData = prefill;
                            BookingEngine._renderStep(1);
                        })
                        .catch(err => console.warn('Pre-fill error:', err));
                };

                // ChГҹв•—ВҘ mount() hoв”ңГЎn thв”ңГЎnh (async) rГҹв•—Гҙi mГҹв•—Вўi fill
                if (mountPromise && typeof mountPromise.then === 'function') {
                    mountPromise.then(doFill);
                } else {
                    setTimeout(doFill, 500);
                }
            }
        });
</script>
</body>

</html>
